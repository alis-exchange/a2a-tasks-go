<svg viewBox="0 0 900 250" width="100%" height="250" xmlns="http://www.w3.org/2000/svg" style="background-color: #121212;">
  <style>
    .label {
      font-family: 'Google Sans', -apple-system, sans-serif;
      font-weight: bold;
      font-size: 18px;
      fill: #777;
    }
    .sublabel {
      font-family: 'Google Sans', -apple-system, sans-serif;
      font-size: 12px;
      fill: #777;
    }
  </style>

  <defs>
    <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#4285F4" opacity="0.15" />
    </pattern>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F02222" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#F02222" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="pipelineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4285F4" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#F02222" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4285F4" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#dotGrid)" />

  <line x1="300" y1="20" x2="300" y2="230" stroke="#333" stroke-dasharray="4,4" />
  <line x1="600" y1="20" x2="600" y2="230" stroke="#333" stroke-dasharray="4,4" />

  <text x="150" y="210" class="label" text-anchor="middle">📋 Task State</text>
  <text x="150" y="230" class="sublabel" text-anchor="middle">Submitted to Completed</text>

  <text x="450" y="210" class="label" text-anchor="middle">🔁 Versioned</text>
  <text x="450" y="230" class="sublabel" text-anchor="middle">Optimistic Updates</text>

  <text x="750" y="210" class="label" text-anchor="middle">🗄️ Persist</text>
  <text x="750" y="230" class="sublabel" text-anchor="middle">Spanner Tasks</text>

  <g transform="translate(70, 45)">
    <g>
      <rect x="0" y="0" width="125" height="28" rx="10" fill="#334155" stroke="#475569" stroke-width="1.5" />
      <circle cx="16" cy="14" r="5" fill="#4285F4" />
      <line x1="30" y1="14" x2="92" y2="14" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.75" />
      <text x="103" y="18" font-family="Google Sans, -apple-system, sans-serif" font-size="11" fill="#9ca3af">v1</text>
    </g>

    <g transform="translate(12, 42)">
      <rect x="0" y="0" width="105" height="24" rx="9" fill="#4285F4" opacity="0.85" />
      <line x1="16" y1="12" x2="72" y2="12" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0.9" />
      <animate attributeName="opacity" values="0.45;1;0.45" dur="2.6s" repeatCount="indefinite" />
    </g>

    <g transform="translate(28, 82)">
      <rect x="0" y="0" width="88" height="24" rx="9" fill="#F02222" opacity="0.85" />
      <line x1="16" y1="12" x2="56" y2="12" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0.9" />
      <animate attributeName="opacity" values="0.2;0.2;1;1;0.2" keyTimes="0;0.45;0.5;0.85;1" dur="4.5s" repeatCount="indefinite" />
    </g>

    <g transform="translate(120, 14)">
      <path d="M0,12 C24,12 32,28 54,28" fill="none" stroke="#4285F4" stroke-width="2" opacity="0.55" />
      <path d="M0,54 C24,54 32,68 54,68" fill="none" stroke="#F02222" stroke-width="2" opacity="0.55" />
    </g>
  </g>

  <g transform="translate(450, 100)">
    <circle cx="0" cy="0" r="46" fill="none" stroke="#F02222" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="18s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#4285F4" stroke-width="1" stroke-dasharray="2 6" opacity="0.45">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
    </circle>

    <rect x="-34" y="-24" width="68" height="48" rx="8" fill="#334155" stroke="#475569" stroke-width="1.5" />
    <text x="-19" y="-5" font-family="Google Sans, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">v1</text>
    <text x="7" y="-5" font-family="Google Sans, -apple-system, sans-serif" font-size="13" fill="#94a3b8">→</text>
    <text x="17" y="-5" font-family="Google Sans, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">v2</text>
    <line x1="-18" y1="10" x2="18" y2="10" stroke="#F02222" stroke-width="3.5" stroke-linecap="round">
      <animate attributeName="x2" values="-6;18;-6" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.35;1;0.35" dur="2s" repeatCount="indefinite" />
    </line>

    <circle cx="0" cy="0" r="12" fill="url(#glow)">
      <animate attributeName="r" values="12;44" dur="2.1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0" dur="2.1s" repeatCount="indefinite" />
    </circle>
  </g>

  <g transform="translate(750, 96)">
    <g stroke="#4285F4" stroke-width="2" fill="none">
      <ellipse cx="0" cy="-24" rx="38" ry="13" opacity="0.8" />
      <path d="M -38,-24 L -38,0 A 38 13 0 0 0 38,0 L 38,-24" opacity="0.62" />
      <path d="M -38,0 L -38,24 A 38 13 0 0 0 38,24 L 38,0" opacity="0.42" />
    </g>

    <rect x="-22" y="-52" width="44" height="18" rx="5" fill="#334155" stroke="#475569" stroke-width="1.2" />
    <text x="0" y="-39" text-anchor="middle" font-family="Google Sans, -apple-system, sans-serif" font-size="10" fill="#cbd5e1">Task</text>

    <circle cx="0" cy="-44" r="3" fill="#F02222">
      <animate attributeName="cy" values="-44;-24" dur="1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" />
    </circle>
    <circle cx="16" cy="-50" r="2.2" fill="#fff" opacity="0.7">
      <animate attributeName="cy" values="-50;-24" dur="1.2s" begin="0.4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.7;0" dur="1.2s" begin="0.4s" repeatCount="indefinite" />
    </circle>
    <circle cx="-14" cy="-48" r="2.2" fill="#4285F4" opacity="0.8">
      <animate attributeName="cy" values="-48;-24" dur="1.05s" begin="0.7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.8;0" dur="1.05s" begin="0.7s" repeatCount="indefinite" />
    </circle>

    <line x1="-16" y1="-19" x2="18" y2="-19" stroke="#F02222" stroke-width="2" opacity="0.55">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
    </line>
    <line x1="-10" y1="4" x2="20" y2="4" stroke="#4285F4" stroke-width="2" opacity="0.55">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" repeatCount="indefinite" />
    </line>
  </g>

  <path id="flowPath" d="M 0,100 C 150,100 200,60 300,100 S 400,100 450,100 S 500,140 600,100 S 700,100 900,100" fill="none" stroke="url(#pipelineGradient)" stroke-width="2" opacity="0.3" />

  <circle r="4" fill="#fff">
    <animate attributeName="fill"
             values="#ccc;#ccc;#F02222;#F02222;#4285F4;#4285F4"
             keyTimes="0;0.333;0.334;0.666;0.667;1"
             dur="7s"
             repeatCount="indefinite" />
    <animateMotion dur="7s" repeatCount="indefinite">
      <mpath href="#flowPath"/>
    </animateMotion>
  </circle>

  <circle r="3" fill="#4285F4">
    <animate attributeName="fill"
             values="#4285F4;#4285F4;#F02222;#F02222;#ccc;#ccc"
             keyTimes="0;0.333;0.334;0.666;0.667;1"
             dur="7s"
             repeatCount="indefinite" />
    <animateMotion dur="14s" repeatCount="indefinite" keyPoints="1;0" keyTimes="0;1" calcMode="linear">
      <mpath href="#flowPath"/>
    </animateMotion>
  </circle>
</svg>
